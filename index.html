<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRODE UTE – Mundial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --rojo:#C8102E;--azul:#003DA5;--dorado:#D4A017;--dorado-claro:#F5CE6A;--verde:#009A44;--blanco:#FAFAF8;--gris-oscuro:#1A1A2E;--gris-medio:#2D2D4A;--radio:8px; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Barlow',sans-serif;background:var(--gris-oscuro);color:var(--blanco);min-height:100vh}
  .header{background:linear-gradient(135deg,var(--rojo) 0%,#8B0000 40%,var(--azul) 100%);position:relative;overflow:hidden}
  .header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,.03) 20px,rgba(255,255,255,.03) 40px)}
  .header-inner{position:relative;display:flex;align-items:center;justify-content:space-between;padding:18px 32px;flex-wrap:wrap;gap:12px}
  .logo-section{display:flex;align-items:center;gap:16px}
  .logo-badge{background:var(--dorado);color:var(--gris-oscuro);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;letter-spacing:2px;padding:6px 14px;border-radius:4px;text-transform:uppercase}
  .header h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;letter-spacing:3px;color:white;text-transform:uppercase;text-shadow:0 2px 8px rgba(0,0,0,.5)}
  .header h1 span{color:var(--dorado-claro)}
  .header-flags{font-size:22px;letter-spacing:4px}
  .subtitle{width:100%;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:4px;color:rgba(255,255,255,.7);text-transform:uppercase;padding-bottom:14px}
  .nav{background:var(--gris-medio);display:flex;border-bottom:3px solid var(--dorado);overflow-x:auto}
  .nav button{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.6);background:none;border:none;padding:14px 24px;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-3px;transition:all .2s}
  .nav button:hover{color:white;background:rgba(255,255,255,.05)}
  .nav button.active{color:var(--dorado);border-bottom-color:var(--dorado)}
  .content{padding:28px 24px;max-width:1100px;margin:0 auto}
  .page{display:none}.page.active{display:block}
  .section-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:2px;text-transform:uppercase;color:var(--dorado);margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid rgba(212,160,23,.3)}
  .name-input-section{background:var(--gris-medio);border-radius:var(--radio);padding:24px;margin-bottom:28px;border:1px solid rgba(255,255,255,.1)}
  .name-input-section label{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:10px}
  .name-input-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .name-input-row input,.form-field input,.form-field select{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:12px 16px;color:white;font-family:'Barlow',sans-serif;font-size:15px;outline:none;width:100%}
  .name-input-row input{flex:1;min-width:200px;font-size:16px}
  .name-input-row input:focus,.form-field input:focus,.form-field select:focus{border-color:var(--dorado)}
  .name-input-row input::placeholder{color:rgba(255,255,255,.3)}
  .form-field select option{background:var(--gris-oscuro)}
  .btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;text-transform:uppercase;border:none;border-radius:6px;padding:12px 24px;cursor:pointer;transition:all .2s}
  .btn-primary{background:var(--dorado);color:var(--gris-oscuro)}.btn-primary:hover{background:var(--dorado-claro)}
  .btn-danger{background:var(--rojo);color:white}.btn-danger:hover{background:#a00a22}
  .btn-secondary{background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.2)}.btn-secondary:hover{background:rgba(255,255,255,.15)}
  .btn-success{background:var(--verde);color:white}.btn-success:hover{background:#007a35}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .user-status{margin-top:12px;font-size:14px;color:rgba(255,255,255,.6)}
  .user-status.saved{color:var(--verde)}
  .phase-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .phase-tab{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);cursor:pointer;transition:all .2s}
  .phase-tab:hover{border-color:var(--dorado);color:var(--dorado)}
  .phase-tab.active{background:var(--dorado);color:var(--gris-oscuro);border-color:var(--dorado)}
  .matches-grid{display:grid;gap:10px}
  .match-card{background:var(--gris-medio);border-radius:var(--radio);padding:14px 18px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.08)}
  .match-team{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:1px}
  .match-team.home{text-align:right}.match-team.away{text-align:left}
  .score-inputs{display:flex;align-items:center;gap:6px}
  .score-input{width:44px;height:44px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:white;outline:none}
  .score-input:focus{border-color:var(--dorado);background:rgba(212,160,23,.1)}
  .score-input:disabled{opacity:.5;cursor:not-allowed}
  .score-sep{font-size:20px;font-weight:800;color:rgba(255,255,255,.4)}
  .match-date{font-size:11px;color:rgba(255,255,255,.3);text-align:center;margin-top:-4px;margin-bottom:6px;letter-spacing:1px}
  .match-no-data{text-align:center;color:rgba(255,255,255,.3);font-size:14px;padding:40px}
  .save-predictions-bar{margin-top:24px;display:flex;gap:12px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
  .save-info{font-size:13px;color:rgba(255,255,255,.5)}
  .scores-table-wrap{overflow-x:auto}
  .scores-table{width:100%;border-collapse:collapse;font-size:15px}
  .scores-table th{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);padding:12px 16px;text-align:left;border-bottom:1px solid rgba(255,255,255,.1)}
  .scores-table td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.05);color:var(--blanco)}
  .scores-table tr:hover td{background:rgba(255,255,255,.03)}
  .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px}
  .rank-1{background:var(--dorado);color:var(--gris-oscuro)}.rank-2{background:#A8A9AD;color:var(--gris-oscuro)}.rank-3{background:#CD7F32;color:white}.rank-other{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
  .pts-badge{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;color:var(--dorado)}
  .predictions-viewer{display:grid;gap:16px}
  .prediction-card{background:var(--gris-medio);border-radius:var(--radio);overflow:hidden;border:1px solid rgba(255,255,255,.08)}
  .prediction-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;gap:12px}
  .prediction-header:hover{background:rgba(255,255,255,.03)}
  .prediction-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:1px}
  .prediction-pts{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--dorado);white-space:nowrap}
  .prediction-body{padding:0 18px 16px;display:none}.prediction-body.open{display:block}
  .pred-match-row{display:grid;grid-template-columns:1fr 80px 1fr;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px;gap:8px}
  .pred-match-row:last-child{border-bottom:none}
  .pred-team-home{text-align:right;font-weight:500}.pred-team-away{text-align:left;font-weight:500}
  .pred-score{text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px}
  .pred-score.exact{color:var(--verde)}.pred-score.winner{color:var(--dorado)}.pred-score.wrong{color:rgba(255,255,255,.4)}.pred-score.pending{color:rgba(255,255,255,.4)}
  .admin-login{max-width:380px;margin:60px auto;background:var(--gris-medio);border-radius:var(--radio);padding:36px;border:1px solid rgba(255,255,255,.1);text-align:center}
  .admin-login h2{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;letter-spacing:2px;margin-bottom:6px;color:var(--dorado)}
  .admin-login p{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:24px}
  .form-field{margin-bottom:16px;text-align:left}
  .form-field label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px;font-weight:600}
  .error-msg{color:var(--rojo);font-size:13px;margin-top:8px;min-height:18px}
  .admin-panel{max-width:800px}
  .admin-section{background:var(--gris-medio);border-radius:var(--radio);padding:24px;margin-bottom:24px;border:1px solid rgba(255,255,255,.08)}
  .admin-section h3{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:2px;text-transform:uppercase;color:var(--dorado);margin-bottom:20px}
  .add-match-form{display:grid;gap:12px}
  .match-form-row{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:end}
  .match-form-row .form-field{margin:0}
  .match-form-vs{font-family:'Barlow Condensed',sans-serif;font-weight:800;color:rgba(255,255,255,.3);font-size:18px;text-align:center;padding-bottom:12px}
  .match-form-extra{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .admin-match-list,.admin-users-list{display:grid;gap:8px}
  .admin-match-item{background:rgba(255,255,255,.04);border-radius:6px;padding:14px 16px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:16px;border:1px solid rgba(255,255,255,.06)}
  .admin-match-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;margin-bottom:2px}
  .admin-match-meta{font-size:12px;color:rgba(255,255,255,.4)}
  .admin-match-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .result-inline{display:flex;gap:6px;align-items:center}
  .result-inline input{width:42px;height:36px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:4px;color:white;outline:none;padding:0}
  .result-inline input:focus{border-color:var(--verde)}
  .result-badge-ok{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;padding:2px 12px;border-radius:4px;background:rgba(0,154,68,.2);color:#4dcd7f}
  .admin-user-item{background:rgba(255,255,255,.04);border-radius:6px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(255,255,255,.06);gap:12px;flex-wrap:wrap}
  .admin-user-name{font-weight:600;font-size:15px}
  .admin-user-meta{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px}
  .phase-header{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--dorado);padding:16px 0 8px;margin-top:8px;border-bottom:1px solid rgba(212,160,23,.2);margin-bottom:8px}
  .logout-btn{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:1px;padding:6px 14px;border-radius:4px;cursor:pointer;float:right}
  .logout-btn:hover{border-color:var(--rojo);color:var(--rojo)}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--verde);color:white;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:1px;padding:14px 22px;border-radius:8px;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;max-width:320px}
  .toast.show{transform:translateY(0);opacity:1}.toast.error{background:var(--rojo)}
  .loading-overlay{position:fixed;inset:0;background:var(--gris-oscuro);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9998;gap:16px}
  .loading-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--dorado);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:2px;color:rgba(255,255,255,.5)}
  .empty-state{text-align:center;padding:60px 20px;color:rgba(255,255,255,.3)}
  .empty-state .icon{font-size:48px;margin-bottom:16px}
  @media(max-width:600px){
    .match-card{grid-template-columns:1fr;text-align:center;gap:8px}
    .match-team.home,.match-team.away{text-align:center}
    .score-inputs{justify-content:center}
    .match-form-row{grid-template-columns:1fr}
    .match-form-vs{display:none}
    .admin-match-item{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Conectando con Firebase...</div>
</div>

<div class="header">
  <div class="header-inner">
    <div class="logo-section">
      <div class="logo-badge">PRODE UTE</div>
      <h1>Mundial <span>2026</span></h1>
    </div>
    <div class="header-flags">🇺🇸🇨🇦🇲🇽</div>
  </div>
  <div class="subtitle">USA · Canadá · México – Junio / Julio 2026</div>
</div>

<nav class="nav">
  <button class="active" onclick="showPage('predict')">🔮 Mis Predicciones</button>
  <button onclick="showPage('scores')">🏆 Tabla</button>
  <button onclick="showPage('view')">👁 Ver Pronósticos</button>
  <button onclick="showPage('admin')">⚙️ Admin</button>
</nav>

<div class="content">
  <div class="page active" id="page-predict">
    <div class="section-title">Mis Predicciones</div>
    <div class="name-input-section">
      <label>Tu nombre de participante</label>
      <div class="name-input-row">
        <input type="text" id="user-name-input" placeholder="Ej: Juan García" maxlength="30">
        <button class="btn btn-primary" onclick="loadUserPredictions()">Cargar mis picks</button>
      </div>
      <div class="user-status" id="user-status"></div>
    </div>
    <div id="predict-content" style="display:none">
      <div class="phase-tabs" id="predict-phase-tabs"></div>
      <div class="matches-grid" id="predict-matches"></div>
      <div class="save-predictions-bar">
        <span class="save-info" id="save-info-msg"></span>
        <button class="btn btn-success" id="save-btn" onclick="savePredictions()">💾 Guardar Predicciones</button>
      </div>
    </div>
  </div>

  <div class="page" id="page-scores">
    <div class="section-title">Tabla de Puntajes</div>
    <div id="scores-content"></div>
  </div>

  <div class="page" id="page-view">
    <div class="section-title">Pronósticos del Grupo</div>
    <div class="predictions-viewer" id="view-content"></div>
  </div>

  <div class="page" id="page-admin">
    <div id="admin-login-section">
      <div class="admin-login">
        <h2>⚙️ Panel Admin</h2>
        <p>Solo para el administrador</p>
        <div class="form-field">
          <label>Contraseña</label>
          <input type="password" id="admin-pass" placeholder="••••••••••••" onkeydown="if(event.key==='Enter')adminLogin()">
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="adminLogin()">Ingresar</button>
        <div class="error-msg" id="admin-error"></div>
      </div>
    </div>
    <div id="admin-panel-section" style="display:none">
      <button class="logout-btn" onclick="adminLogout()">Cerrar sesión</button>
      <div class="section-title" style="margin-bottom:24px">⚙️ Panel de Administración</div>
      <div class="admin-panel">
        <div class="admin-section">
          <h3>➕ Agregar Partido</h3>
          <div class="add-match-form">
            <div class="match-form-row">
              <div class="form-field"><label>Equipo Local</label><input type="text" id="match-home" placeholder="Ej: Argentina" maxlength="30"></div>
              <div class="match-form-vs">VS</div>
              <div class="form-field"><label>Equipo Visitante</label><input type="text" id="match-away" placeholder="Ej: Brasil" maxlength="30"></div>
            </div>
            <div class="match-form-extra">
              <div class="form-field"><label>Fase</label>
                <select id="match-phase">
                  <option value="Grupos">Fase de Grupos</option>
                  <option value="Octavos">Octavos de Final</option>
                  <option value="Cuartos">Cuartos de Final</option>
                  <option value="Semifinal">Semifinal</option>
                  <option value="Final">Final</option>
                </select>
              </div>
              <div class="form-field"><label>Fecha / Info (opcional)</label><input type="text" id="match-date" placeholder="Ej: 15 Jun · Grupo A"></div>
            </div>
            <button class="btn btn-primary" onclick="addMatch()">Agregar Partido</button>
          </div>
        </div>
        <div class="admin-section"><h3>📋 Partidos & Resultados</h3><div class="admin-match-list" id="admin-matches"></div></div>
        <div class="admin-section"><h3>👥 Participantes</h3><div class="admin-users-list" id="admin-users"></div></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBdyhaA38mzIYuUFp73pnZSUZTICNE99oY",
  authDomain: "prode-ute-2026.firebaseapp.com",
  projectId: "prode-ute-2026",
  storageBucket: "prode-ute-2026.firebasestorage.app",
  messagingSenderId: "498533134566",
  appId: "1:498533134566:web:963f0b7d233e21b9fbcb27"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PASS = 'ProdeUTE2026';
const PHASES = ['Grupos','Octavos','Cuartos','Semifinal','Final'];
const PHASE_LABELS = {Grupos:'Fase de Grupos',Octavos:'Octavos de Final',Cuartos:'Cuartos de Final',Semifinal:'Semifinal',Final:'Final'};

let matches=[], predictions={}, results={};
let currentUser=null, userSaved=false, activePredictPhase=null, adminLogged=false;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function toast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(err?' error':'');
  clearTimeout(t._t); t._t=setTimeout(()=>{t.className='toast'},3000);
}

// ── INIT ──
onSnapshot(collection(db,'matches'),snap=>{
  matches=[];
  snap.forEach(d=>matches.push({id:d.id,...d.data()}));
  matches.sort((a,b)=>{const p=PHASES.indexOf(a.phase)-PHASES.indexOf(b.phase);return p!==0?p:(a.createdAt||0)-(b.createdAt||0)});
  if(currentUser)renderPredictMatches();
  if(adminLogged)renderAdminMatches();
  renderScores(); renderView();
});
onSnapshot(collection(db,'predictions'),snap=>{
  predictions={};
  snap.forEach(d=>{predictions[d.id]=d.data()});
  renderScores(); renderView();
  if(adminLogged)renderAdminUsers();
});
onSnapshot(collection(db,'results'),snap=>{
  results={};
  snap.forEach(d=>{results[d.id]=d.data()});
  renderScores(); renderView();
  if(currentUser)renderPredictMatches();
  document.getElementById('loading-overlay').style.display='none';
});

// ── NAV ──
window.showPage=function(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(e=>e.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav button')[['predict','scores','view','admin'].indexOf(p)].classList.add('active');
  if(p==='scores')renderScores();
  if(p==='view')renderView();
  if(p==='admin'&&adminLogged){renderAdminMatches();renderAdminUsers();}
};

// ── PREDICCIONES ──
window.loadUserPredictions=function(){
  const name=document.getElementById('user-name-input').value.trim();
  if(!name){toast('Ingresá tu nombre primero',true);return;}
  currentUser=name; userSaved=!!predictions[name];
  const s=document.getElementById('user-status');
  if(userSaved){s.className='user-status saved';s.textContent='✔ Tus predicciones ya fueron guardadas. Solo podés verlas.';}
  else{s.className='user-status';s.textContent='Nombre cargado. Completá tus picks y guardá.';}
  document.getElementById('predict-content').style.display='block';
  document.getElementById('save-btn').style.display='';
  if(matches.length===0){
    document.getElementById('predict-phase-tabs').innerHTML='';
    document.getElementById('predict-matches').innerHTML='<div class="match-no-data">⏳ El admin aún no cargó los partidos.</div>';
    document.getElementById('save-btn').style.display='none';
    return;
  }
  const phases=[...new Set(matches.map(m=>m.phase))];
  if(!activePredictPhase||!phases.includes(activePredictPhase))activePredictPhase=phases[0];
  renderPhaseTabs(phases,'predict'); renderPredictMatches();
};

function renderPhaseTabs(phases,ctx){
  const c=document.getElementById(ctx+'-phase-tabs');
  if(!c)return;
  c.innerHTML=phases.map(ph=>`<button class="phase-tab ${activePredictPhase===ph?'active':''}" onclick="switchPhase('${ph}','${ctx}')">${PHASE_LABELS[ph]||ph}</button>`).join('');
}

window.switchPhase=function(ph,ctx){
  activePredictPhase=ph;
  const phases=[...new Set(matches.map(m=>m.phase))];
  renderPhaseTabs(phases,ctx);
  if(ctx==='predict')renderPredictMatches();
};

function renderPredictMatches(){
  const ph=matches.filter(m=>m.phase===activePredictPhase);
  const up=predictions[currentUser]||{};
  const c=document.getElementById('predict-matches');
  if(ph.length===0){c.innerHTML='<div class="match-no-data">No hay partidos en esta fase todavía.</div>';return;}
  c.innerHTML=ph.map(m=>{
    const pred=up[m.id]||{}, dis=userSaved?'disabled':'';
    return `<div class="match-card">
      <div class="match-team home">${esc(m.home)}</div>
      <div class="score-inputs">
        <input class="score-input" type="number" min="0" max="99" ${dis} id="pred-${m.id}-h" value="${pred.h!==undefined?pred.h:''}" placeholder="0">
        <span class="score-sep">-</span>
        <input class="score-input" type="number" min="0" max="99" ${dis} id="pred-${m.id}-a" value="${pred.a!==undefined?pred.a:''}" placeholder="0">
      </div>
      <div class="match-team away">${esc(m.away)}</div>
    </div>${m.date?`<div class="match-date">${esc(m.date)}</div>`:''}`;
  }).join('');
  const msg=document.getElementById('save-info-msg'), btn=document.getElementById('save-btn');
  if(userSaved){msg.textContent='Predicciones guardadas – no se pueden modificar';btn.disabled=true;}
  else{msg.textContent='⚠ Una vez guardado no podrás modificar';btn.disabled=false;}
}

window.savePredictions=async function(){
  if(!currentUser){toast('Ingresá tu nombre primero',true);return;}
  if(userSaved){toast('Ya guardaste tus predicciones',true);return;}
  const up={};let count=0;
  matches.forEach(m=>{
    const h=document.getElementById('pred-'+m.id+'-h'),a=document.getElementById('pred-'+m.id+'-a');
    if(!h||!a)return;
    const hv=h.value.trim(),av=a.value.trim();
    if(hv!==''&&av!==''){up[m.id]={h:parseInt(hv),a:parseInt(av)};count++;}
  });
  if(count===0){toast('Completá al menos un partido',true);return;}
  try{
    await setDoc(doc(db,'predictions',currentUser),up);
    userSaved=true;
    document.getElementById('user-status').className='user-status saved';
    document.getElementById('user-status').textContent='✔ Tus predicciones ya fueron guardadas. Solo podés verlas.';
    document.getElementById('save-btn').disabled=true;
    document.getElementById('save-info-msg').textContent='Predicciones guardadas – no se pueden modificar';
    renderPredictMatches(); toast('✔ Predicciones guardadas correctamente');
  }catch(e){toast('Error al guardar. Revisá la conexión.',true);}
};

// ── TABLA ──
function calcScore(name){
  const up=predictions[name]||{};
  let pts=0,exact=0,winner=0,total=0;
  matches.forEach(m=>{
    const res=results[m.id],pred=up[m.id];
    if(!res||!pred)return; total++;
    if(pred.h===res.h&&pred.a===res.a){pts+=3;exact++;}
    else{const rs=Math.sign(res.h-res.a),ps=Math.sign(pred.h-pred.a);if(rs===ps){pts+=1;winner++;}}
  });
  return{pts,exact,winner,total};
}

function renderScores(){
  const names=Object.keys(predictions),c=document.getElementById('scores-content');
  if(!c)return;
  if(names.length===0){c.innerHTML='<div class="empty-state"><div class="icon">🏆</div><p>Nadie cargó predicciones todavía.</p></div>';return;}
  const rows=names.map(n=>({name:n,...calcScore(n)})).sort((a,b)=>b.pts-a.pts||b.exact-a.exact);
  c.innerHTML=`<div class="scores-table-wrap"><table class="scores-table">
    <thead><tr><th>#</th><th>Participante</th><th>Pts</th><th>Exactos (×3)</th><th>Ganador (×1)</th><th>Partidos</th></tr></thead>
    <tbody>${rows.map((r,i)=>`<tr>
      <td><span class="rank-badge rank-${i<3?i+1:'other'}">${i+1}</span></td>
      <td style="font-weight:600">${esc(r.name)}</td>
      <td><span class="pts-badge">${r.pts}</span></td>
      <td>${r.exact}</td><td>${r.winner}</td><td>${r.total}</td>
    </tr>`).join('')}</tbody>
  </table></div>
  <div style="margin-top:16px;font-size:12px;color:rgba(255,255,255,.3);letter-spacing:1px">🟢 Resultado exacto = 3 pts &nbsp;|&nbsp; 🟡 Ganador correcto = 1 pt</div>`;
}

// ── VER PRONÓSTICOS ──
function renderView(){
  const names=Object.keys(predictions),c=document.getElementById('view-content');
  if(!c)return;
  if(names.length===0){c.innerHTML='<div class="empty-state"><div class="icon">👁</div><p>Nadie cargó predicciones todavía.</p></div>';return;}
  const rows=names.map(n=>({name:n,...calcScore(n)})).sort((a,b)=>b.pts-a.pts);
  c.innerHTML=rows.map(r=>`
    <div class="prediction-card">
      <div class="prediction-header" onclick="toggleCard('${esc(r.name)}')">
        <div class="prediction-name">${esc(r.name)}</div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="prediction-pts">${r.pts} pts</div>
          <div id="tog-${esc(r.name)}">▼</div>
        </div>
      </div>
      <div class="prediction-body" id="body-${esc(r.name)}">${renderUserBody(r.name)}</div>
    </div>`).join('');
}

function renderUserBody(name){
  if(matches.length===0)return'<p style="color:rgba(255,255,255,.3);font-size:14px">Sin partidos aún.</p>';
  const up=predictions[name]||{};
  let html='';
  const phases=[...new Set(matches.map(m=>m.phase))];
  phases.forEach(ph=>{
    html+=`<div class="phase-header">${PHASE_LABELS[ph]||ph}</div>`;
    matches.filter(m=>m.phase===ph).forEach(m=>{
      const pred=up[m.id],res=results[m.id];
      let cls='pending',score='–';
      if(pred){
        score=`${pred.h} - ${pred.a}`;
        if(res){
          if(pred.h===res.h&&pred.a===res.a)cls='exact';
          else{const rs=Math.sign(res.h-res.a),ps=Math.sign(pred.h-pred.a);cls=rs===ps?'winner':'wrong';}
        }
      }
      html+=`<div class="pred-match-row">
        <div class="pred-team-home">${esc(m.home)}</div>
        <div class="pred-score ${cls}">${score}</div>
        <div class="pred-team-away">${esc(m.away)}</div>
      </div>`;
    });
  });
  return html;
}

window.toggleCard=function(name){
  const b=document.getElementById('body-'+name),t=document.getElementById('tog-'+name);
  if(!b)return; const open=b.classList.toggle('open');
  if(t)t.textContent=open?'▲':'▼';
};

// ── ADMIN ──
window.adminLogin=function(){
  if(document.getElementById('admin-pass').value===ADMIN_PASS){
    adminLogged=true;
    document.getElementById('admin-login-section').style.display='none';
    document.getElementById('admin-panel-section').style.display='block';
    renderAdminMatches(); renderAdminUsers();
  }else{
    document.getElementById('admin-error').textContent='❌ Contraseña incorrecta';
    setTimeout(()=>{document.getElementById('admin-error').textContent='';},2500);
  }
};

window.adminLogout=function(){
  adminLogged=false;
  document.getElementById('admin-login-section').style.display='';
  document.getElementById('admin-panel-section').style.display='none';
  document.getElementById('admin-pass').value='';
};

window.addMatch=async function(){
  const home=document.getElementById('match-home').value.trim();
  const away=document.getElementById('match-away').value.trim();
  const phase=document.getElementById('match-phase').value;
  const date=document.getElementById('match-date').value.trim();
  if(!home||!away){toast('Ingresá ambos equipos',true);return;}
  const id='m_'+Date.now();
  try{
    await setDoc(doc(db,'matches',id),{home,away,phase,date,createdAt:Date.now()});
    document.getElementById('match-home').value='';
    document.getElementById('match-away').value='';
    document.getElementById('match-date').value='';
    toast('✔ Partido agregado');
  }catch(e){toast('Error al guardar',true);}
};

window.deleteMatch=async function(id){
  if(!confirm('¿Eliminar este partido?'))return;
  try{
    await deleteDoc(doc(db,'matches',id));
    await deleteDoc(doc(db,'results',id));
    const snap=await getDocs(collection(db,'predictions'));
    for(const d of snap.docs){
      const data=d.data();
      if(data[id]){delete data[id];await setDoc(doc(db,'predictions',d.id),data);}
    }
    toast('Partido eliminado');
  }catch(e){toast('Error al eliminar',true);}
};

window.saveResult=async function(id){
  const h=document.getElementById('res-'+id+'-h')?.value.trim();
  const a=document.getElementById('res-'+id+'-a')?.value.trim();
  if(h===''||!h||a===''||!a){toast('Ingresá ambos goles',true);return;}
  try{await setDoc(doc(db,'results',id),{h:parseInt(h),a:parseInt(a)});toast('✔ Resultado guardado');}
  catch(e){toast('Error al guardar resultado',true);}
};

window.clearResult=async function(id){
  if(!confirm('¿Quitar el resultado?'))return;
  try{await deleteDoc(doc(db,'results',id));toast('Resultado eliminado');}
  catch(e){toast('Error',true);}
};

window.deleteUser=async function(name){
  if(!confirm(`¿Eliminar a "${name}"?`))return;
  try{await deleteDoc(doc(db,'predictions',name));toast(`"${name}" eliminado`);}
  catch(e){toast('Error',true);}
};

window.resetUser=async function(name){
  if(!confirm(`¿Resetear los picks de "${name}"?`))return;
  try{
    await deleteDoc(doc(db,'predictions',name));
    if(currentUser===name)userSaved=false;
    toast(`Picks de "${name}" reseteados`);
  }catch(e){toast('Error',true);}
};

function renderAdminMatches(){
  const c=document.getElementById('admin-matches');
  if(!c)return;
  if(matches.length===0){c.innerHTML='<div style="color:rgba(255,255,255,.3);font-size:14px;padding:20px 0">No hay partidos cargados.</div>';return;}
  let html='';
  const phases=[...new Set(matches.map(m=>m.phase))];
  phases.forEach(ph=>{
    html+=`<div class="phase-header">${PHASE_LABELS[ph]||ph}</div>`;
    matches.filter(m=>m.phase===ph).forEach(m=>{
      const res=results[m.id];
      html+=`<div class="admin-match-item">
        <div>
          <div class="admin-match-name">${esc(m.home)} vs ${esc(m.away)}</div>
          <div class="admin-match-meta">${esc(m.date||'')}</div>
        </div>
        <div class="admin-match-actions">
          ${res?`<span class="result-badge-ok">${res.h} - ${res.a}</span>
            <button class="btn btn-secondary" style="font-size:12px;padding:8px 12px" onclick="clearResult('${m.id}')">✏ Editar</button>`
          :`<div class="result-inline">
              <input type="number" min="0" max="99" id="res-${m.id}-h" placeholder="0">
              <span style="color:rgba(255,255,255,.4);font-weight:800">-</span>
              <input type="number" min="0" max="99" id="res-${m.id}-a" placeholder="0">
              <button class="btn btn-success" style="font-size:12px;padding:8px 12px" onclick="saveResult('${m.id}')">Guardar</button>
            </div>`}
          <button class="btn btn-danger" style="font-size:12px;padding:8px 12px" onclick="deleteMatch('${m.id}')">🗑</button>
        </div>
      </div>`;
    });
  });
  c.innerHTML=html;
}

function renderAdminUsers(){
  const c=document.getElementById('admin-users');
  if(!c)return;
  const names=Object.keys(predictions);
  if(names.length===0){c.innerHTML='<div style="color:rgba(255,255,255,.3);font-size:14px;padding:20px 0">Nadie cargó predicciones todavía.</div>';return;}
  c.innerHTML=names.map(n=>{
    const s=calcScore(n),cnt=Object.keys(predictions[n]).length;
    return`<div class="admin-user-item">
      <div>
        <div class="admin-user-name">${esc(n)}</div>
        <div class="admin-user-meta">${cnt} partido(s) · ${s.pts} pts</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-danger" style="font-size:12px;padding:8px 14px" onclick="deleteUser('${esc(n)}')">🗑 Eliminar</button>
        <button class="btn btn-secondary" style="font-size:12px;padding:8px 14px" onclick="resetUser('${esc(n)}')">↩ Resetear picks</button>
      </div>
    </div>`;
  }).join('');
}
</script>
